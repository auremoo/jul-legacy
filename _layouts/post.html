---
layout: default
---
<div class="page-content">
  <article>
    <div class="page-hero page-hero--dark">
      <div class="container container--narrow">
        <div class="page-hero__content">
          <p class="page-hero__label" style="color:#C9A84C">
            Actualités · {{ page.date | date: "%d %B %Y" }}
          </p>
          <h1 class="page-hero__title" style="color:#F5F5F0">{{ page.title }}</h1>
          {% if page.excerpt %}
            <p class="page-hero__desc">{{ page.excerpt | strip_html }}</p>
          {% endif %}
          <div class="divider-gold"></div>
          {% if page.tags %}
            <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem">
              {% for tag in page.tags %}
                <span class="badge badge--single">{{ tag }}</span>
              {% endfor %}
            </div>
          {% endif %}
        </div>
      </div>
    </div>

    <div class="section" style="background:#0A0A0A">
      <div class="container container--narrow">
        <div class="post-body" style="color:#DDDBD3;line-height:1.8;font-size:1.05rem">
          {{ content }}
        </div>

        <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(201,168,76,.1)">
          <a href="{{ '/actualites/' | relative_url }}" class="btn btn--outline-gold">
            ← Retour aux actualités
          </a>
        </div>
      </div>
    </div>
  </article>
</div>
