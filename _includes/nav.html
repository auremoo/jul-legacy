<nav class="site-nav" id="site-nav" aria-label="Navigation principale">
  <div class="nav__inner">
    <a href="{{ '/' | relative_url }}" class="nav__logo" aria-label="Accueil Jul Fan">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Logo Jul" width="36" height="36" onerror="this.onerror=null;this.src='{{ '/assets/images/logo.svg' | relative_url }}'">
      <span>Jul <em>Fan</em></span>
    </a>

    <div class="nav__links" id="nav-links" role="list">
      {% assign pages_list = site.pages | where_exp: "p", "p.nav_order" | sort: "nav_order" %}
      {% for p in pages_list %}
        <a href="{{ p.url | relative_url }}"
           class="nav__link{% if page.url == p.url %} active{% endif %}"
           role="listitem">
          {{ p.nav_title | default: p.title }}
        </a>
      {% endfor %}
    </div>

    <button class="nav__hamburger" id="hamburger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="nav-links">
      <i class="ph-bold ph-list nav__hamburger-icon nav__hamburger-icon--open"></i>
      <i class="ph-bold ph-x   nav__hamburger-icon nav__hamburger-icon--close"></i>
    </button>
  </div>
</nav>
